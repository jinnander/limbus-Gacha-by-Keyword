<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>키워드별 인격 뽑기</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 2px solid #d4af37;
            padding: 30px;
            background-color: #262626;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }
        h1 { color: #d4af37; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .controls { margin-bottom: 20px; }
        select {
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #d4af37;
            border-radius: 4px;
        }
        button {
            padding: 10px 25px;
            background-color: #d4af37;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            border-radius: 4px;
        }
        button:hover { background-color: #f1c40f; }
        #result {
            margin-top: 30px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #444;
            width: 100%;
        }
        .rarity-3 { color: #ff3e3e; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5); font-size: 1.8rem; }
        .rarity-2 { color: #ffae00; font-size: 1.5rem; }
        .rarity-1 { color: #ffffff; font-size: 1.2rem; }
        .sinner-name { font-size: 1.1rem; color: #aaa; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Limbus Company</h1>
        <p>키워드를 선택하고 인격을 뽑으세요.</p>

        <div class="controls">
            <select id="keywordSelect">
                <option value="전체">전체</option>
                <option value="출혈">출혈</option>
                <option value="호흡">호흡</option>
                <option value="파열">파열</option>
                <option value="화상">화상</option>
                <option value="충전">충전</option>
                <option value="침잠">침잠</option>
                <option value="진동">진동</option>
            </select>
            <button onclick="extractIdentity()">뽑기</button>
        </div>

        <div id="result">
            <div id="resultText">관리자님, 인격을 뽑으세요.</div>
        </div>
    </div>

    <script>
        // 키워드(keyword) 속성을 추가하여 데이터 업데이트
        const identities = [
            { name: "남부 섕크 협회 4과", sinner: "싱클레어", rarity: 3, keyword: "호흡" },
            { name: "검계 살수", sinner: "이상", rarity: 3, keyword: "호흡" },
            { name: "쥐는 자", sinner: "파우스트", rarity: 3, keyword: "출혈" },
            { name: "N사 중간 망치", sinner: "돈키호테", rarity: 2, keyword: "출혈" },
            { name: "W사 3정리요원", sinner: "돈키호테", rarity: 3, keyword: "충전" },
            { name: "R사 제 4무리 토끼팀", sinner: "히스클리프", rarity: 3, keyword: "충전" },
            { name: "리우 협회 4과", sinner: "이슈마엘", rarity: 3, keyword: "화상" },
            { name: "어금니 사무소 해결사", sinner: "오티스", rarity: 3, keyword: "진동" },
            { name: "해녀", sinner: "이슈마엘", rarity: 2, keyword: "침잠" },
            { name: "세븐 협회 6과", sinner: "이상", rarity: 2, keyword: "파열" }
        ];

        function extractIdentity() {
            const selectedKeyword = document.getElementById('keywordSelect').value;
            const resultDiv = document.getElementById('resultText');
            
            let filtered = [];
            if (selectedKeyword === "전체") {
                filtered = identities;
            } else {
                // i.faction 대신 i.keyword로 필터링하도록 수정
                filtered = identities.filter(i => i.keyword === selectedKeyword);
            }

            if (filtered.length > 0) {
                const randomIdx = Math.floor(Math.random() * filtered.length);
                const pick = filtered[randomIdx];

                resultDiv.innerHTML = `
                    <div class="sinner-name">[${pick.sinner}]</div>
                    <div class="rarity-${pick.rarity}">
                        ${"★".repeat(pick.rarity)} ${pick.name}
                    </div>
                    <div style="font-size: 0.9rem; color: #666; mt-2">#${pick.keyword}</div>
                `;
            } else {
                resultDiv.innerHTML = `<div style="color: #888;">아직 '${selectedKeyword}' 키워드의 데이터가 입력되지 않았습니다.</div>`;
            }
        }
    </script>
</body>
</html>
